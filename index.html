<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Where is my ride?</title>
    <meta name="description" content="Track your trains and flights in real-time" />
    <meta name="Aryan" content="Aryan" />
    <link rel="icon" type="image/png" href="/Company.png" />

    <meta property="og:title" content="Hercules App" />
   
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="/Frontend/assets/Company.png"
    />
    <meta property="og:image:type" content="image/png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="/Frontend/assets/Company.png"
  
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
      crossorigin
    />

    <!-- Detect dark mode preference and set the class before next-themes loads. This avoids a flash of unstyled content (FOUC) when the page loads. -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "system" || !theme) {
            var prefersDark = window.matchMedia(
              "(prefers-color-scheme: dark)",
            ).matches;
            theme = prefersDark ? "dark" : "light";
          }
          document.documentElement.classList.add(theme);
        } catch (e) {}
      })();
    </script>

    <link href="/src/index.css" rel="stylesheet" />
    <style>
      .intro-overlay{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
      .intro-hidden{display:none}
      .intro-video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:transparent;display:block;transform:translateY(54px);clip-path:inset(2px 48px 2px 2px)}
      .intro-mask-right{position:absolute;top:0;right:0;width:20px;height:100%;background:#fff;pointer-events:none}
      .bg-video{position:fixed;inset:0;z-index:0;pointer-events:none}
      .bg-video video{width:100%;height:100%;object-fit:cover;filter:brightness(0.45) saturate(1.1) blur(1px)}
    </style>
  </head>
  <body>
    <div class="bg-video" aria-hidden="true">
      <video autoplay muted playsinline loop>
        <source src="/Frontend/assets/Background.mp4" type="video/mp4" />
      </video>
    </div>
    <div id="intro" class="intro-overlay">
      <video id="introVideo" class="intro-video" autoplay muted playsinline>
        <source src="/Frontend/assets/intro.mp4" type="video/mp4" />
      </video>
      <div class="intro-mask-right" aria-hidden="true"></div>
    </div>
    <div id="root" style="position:relative;z-index:1"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        // Watchdog: ensure app mounts even if module load is delayed by cache
        setTimeout(function(){
          try{
            if(!window.__WIMR_APP_BOOT){
              import('/src/main.tsx').catch(()=>{});
            }
          }catch(e){}
        }, 600);
        const hideIntro = () => {
          const i = document.getElementById("intro");
          if (i) i.classList.add("intro-hidden");
        };
        const v = document.getElementById("introVideo");
        if (v) {
          v.addEventListener("ended", hideIntro, { once: true });
          v.addEventListener("error", hideIntro, { once: true });
          setTimeout(hideIntro, 8000);
        } else {
          hideIntro();
        }
      })();
    </script>
  </body>
</html>
