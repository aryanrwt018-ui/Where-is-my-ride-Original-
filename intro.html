<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Where is my ride?</title>

<style>

body{
margin:0;
background:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* video container */

.video-box{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:white;
}

/* video */

video{
max-width:100%;
max-height:100%;
transform:scale(1.03); /* very small zoom to hide borders */
}

.fade-out{
animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
from{opacity:1;}
to{opacity:0;}
}

</style>

</head>

<body>

<div class="video-box">

<video id="introVideo" autoplay muted>
<source src="Frontend/assets/intro.mp4" type="video/mp4">
</video>

</div>

<script>

const video = document.getElementById("introVideo");

video.onended = function(){

document.body.classList.add("fade-out");

setTimeout(function(){
window.location.href="index.html";
},1000);

};

</script>

</body>

</html>
